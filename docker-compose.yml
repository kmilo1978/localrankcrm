# ============================================================
# LocalRank CRM — Ruta B: app + Postgres + Caddy (HTTPS automático)
# Uso:  cp .env.example .env  →  rellenar  →  docker compose up -d --build
# ============================================================
services:
  app:
    build: .
    restart: unless-stopped
    environment:
      APP_BASE_URL: ${APP_BASE_URL}
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/localrank
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      META_WEBHOOK_VERIFY_TOKEN: ${META_WEBHOOK_VERIFY_TOKEN}
      META_APP_SECRET: ${META_APP_SECRET:-}
      META_GRAPH_API_VERSION: ${META_GRAPH_API_VERSION:-v25.0}
      OPENROUTER_API_TOKEN: ${OPENROUTER_API_TOKEN:-}
      OPENROUTER_BASE_URL: ${OPENROUTER_BASE_URL:-https://openrouter.ai/api}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-}
      OPENROUTER_JUDGE_MODEL: ${OPENROUTER_JUDGE_MODEL:-}
      ALLOW_SIGNUP: ${ALLOW_SIGNUP:-}
      AGENT_COALESCE_MS: ${AGENT_COALESCE_MS:-6000}
      EXTENSION_API_KEY: ${EXTENSION_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: localrank
    volumes:
      - localrank_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d localrank"]
      interval: 10s
      timeout: 5s
      retries: 10

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - localrank_caddy_data:/data
      - localrank_caddy_config:/config
    depends_on:
      - app
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:2019/config/"]
      interval: 15s
      timeout: 5s
      retries: 5

volumes:
  localrank_pg:
  localrank_caddy_data:
  localrank_caddy_config:
