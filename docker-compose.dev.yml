# Postgres local para desarrollo. Uso: docker compose -f docker-compose.dev.yml up -d
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: vocero
    ports:
      - "5432:5432"
    volumes:
      - vocero_dev_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d vocero"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  vocero_dev_pg:
