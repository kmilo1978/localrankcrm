# Postgres local para desarrollo. Uso: docker compose -f docker-compose.dev.yml up -d
# `name` propio: evita colisionar con el proyecto del docker-compose.yml (Ruta B).
name: localrank-dev

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: localrank
    ports:
      - "5432:5432"
    volumes:
      - localrank_dev_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d localrank"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  localrank_dev_pg:
